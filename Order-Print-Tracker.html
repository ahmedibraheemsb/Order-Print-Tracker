<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طباعة الفواتير — EcomModa</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<style>
/* ── CSS Variables ──────────────────────────────────────────────────────────── */
:root {
  --bg:           #f3f4f6;
  --surface:      #ffffff;
  --surface-2:    #f9fafb;
  --border:       #e5e7eb;
  --border-strong:#d1d5db;
  --text-primary:   #111827;
  --text-secondary: #6b7280;
  --text-muted:     #9ca3af;
  --accent:        #2563eb;
  --accent-light:  #eff6ff;
  --accent-dark:   #1d4ed8;
  --green:         #16a34a;
  --green-light:   #f0fdf4;
  --green-border:  #86efac;
  --red:           #dc2626;
  --red-light:     #fef2f2;
  --red-border:    #fca5a5;
  --amber:         #d97706;
  --amber-light:   #fffbeb;
  --radius:    12px;
  --radius-sm: 8px;
  --shadow:    0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans Arabic', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  font-size: 14px;
  min-height: 100vh;
}

/* ── Header ──────────────────────────────────────────────────────────────────── */
.app-header {
  position: sticky; top: 0; z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: var(--shadow);
}
.header-brand { display: flex; align-items: center; gap: 10px; }
.header-brand h1 { font-size: 17px; font-weight: 700; }
.header-badge {
  background: var(--accent-light); color: var(--accent);
  font-size: 11px; font-weight: 700;
  padding: 3px 10px; border-radius: 20px;
}
.header-actions { display: flex; gap: 8px; align-items: center; }

/* ── Buttons ──────────────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: var(--radius-sm);
  font-family: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer; border: none; transition: all .15s;
}
.btn-primary  { background: var(--accent); color: #fff; }
.btn-primary:hover  { background: var(--accent-dark); }
.btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
.btn-ghost    { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-strong); }
.btn-ghost:hover    { background: var(--surface-2); }
.btn-sm { padding: 6px 12px; font-size: 12px; }

/* ── Main ────────────────────────────────────────────────────────────────────── */
.main { padding: 20px; max-width: 1300px; margin: 0 auto; }

/* ── States ──────────────────────────────────────────────────────────────────── */
.state-box {
  background: var(--surface); border-radius: var(--radius);
  padding: 60px 20px; text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 14px;
  box-shadow: var(--shadow);
}
.state-box.error { border: 1px solid var(--red-border); }
.state-icon { font-size: 40px; }
.state-msg  { color: var(--text-secondary); }
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── KPI Grid ────────────────────────────────────────────────────────────────── */
.kpi-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
  margin-bottom: 20px;
}
.kpi-card {
  background: var(--surface); border-radius: var(--radius);
  padding: 16px 20px; box-shadow: var(--shadow); border: 1px solid var(--border);
}
.kpi-value { font-size: 32px; font-weight: 800; font-family: 'IBM Plex Mono', monospace; }
.kpi-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
.kpi-card.accent .kpi-value { color: var(--accent); }
.kpi-card.green  .kpi-value { color: var(--green); }
.kpi-card.amber  .kpi-value { color: var(--amber); }

/* ── Filters & Actions Bar ───────────────────────────────────────────────────── */
.toolbar {
  background: var(--surface); border-radius: var(--radius);
  padding: 12px 16px; margin-bottom: 16px;
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  box-shadow: var(--shadow); border: 1px solid var(--border);
}
.toolbar .spacer { flex: 1; }
.filter-group { display: flex; align-items: center; gap: 6px; }
.filter-label { font-size: 12px; color: var(--text-secondary); font-weight: 600; }
input[type="text"], select {
  font-family: inherit; font-size: 13px;
  border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
  padding: 7px 10px; color: var(--text-primary); background: var(--surface);
  outline: none; transition: border-color .15s;
}
input[type="text"]:focus, select:focus { border-color: var(--accent); }
.order-search { font-family: 'IBM Plex Mono', monospace; direction: ltr; width: 120px; }
.result-count { font-size: 12px; color: var(--text-muted); }

/* ── Print Action Bar ────────────────────────────────────────────────────────── */
.print-bar {
  background: var(--accent-light); border: 1px solid var(--accent);
  border-radius: var(--radius); padding: 12px 16px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 12px;
}
.print-bar-info { font-size: 13px; font-weight: 600; color: var(--accent); }

/* ── Table ───────────────────────────────────────────────────────────────────── */
.table-card {
  background: var(--surface); border-radius: var(--radius);
  box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden;
}
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead { background: var(--surface-2); }
th {
  padding: 11px 14px; text-align: right;
  font-size: 11px; font-weight: 700; color: var(--text-secondary);
  text-transform: uppercase; letter-spacing: .04em;
  border-bottom: 1px solid var(--border); white-space: nowrap;
}
th.center, td.center { text-align: center; }
td {
  padding: 11px 14px; border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--surface-2); }
tr.selected td { background: var(--accent-light); }

.mono { font-family: 'IBM Plex Mono', monospace; direction: ltr; display: inline-block; }
.type-badge {
  display: inline-flex; align-items: center;
  padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 700; font-family: 'IBM Plex Mono', monospace;
}
.type-s1 { background: var(--accent-light); color: var(--accent); }
.type-s2 { background: var(--amber-light);  color: var(--amber); }
.printed-badge {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 8px; border-radius: 20px;
  background: var(--green-light); color: var(--green);
  font-size: 11px; font-weight: 600;
}
.unprinted-badge {
  display: inline-flex; align-items: center;
  padding: 2px 8px; border-radius: 20px;
  background: var(--surface-2); color: var(--text-muted);
  font-size: 11px;
}

.table-empty { text-align: center; padding: 50px; color: var(--text-muted); }
.table-footer { padding: 10px 16px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-muted); }

/* ── Modal ───────────────────────────────────────────────────────────────────── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.4);
  z-index: 200; display: none; align-items: center; justify-content: center;
}
.overlay.open { display: flex; }
.modal {
  background: var(--surface); border-radius: var(--radius);
  padding: 24px; width: 440px; max-width: 95vw;
  box-shadow: 0 20px 40px rgba(0,0,0,.15);
}
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.modal-title { font-size: 16px; font-weight: 700; }
.modal-close { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--text-muted); }
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; display: block; }
.form-input {
  width: 100%; font-family: 'IBM Plex Mono', monospace;
  font-size: 13px; padding: 9px 12px;
  border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text-primary); outline: none; direction: ltr;
}
.form-input:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

/* ── Checkbox ────────────────────────────────────────────────────────────────── */
input[type="checkbox"] {
  width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent);
}

/* ── Print Overlay ───────────────────────────────────────────────────────────── */
.print-loading-overlay {
  position: fixed; inset: 0; background: rgba(255,255,255,.95);
  z-index: 300; display: none; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
}
.print-loading-overlay.show { display: flex; }
.print-loading-msg { font-size: 16px; font-weight: 600; color: var(--text-primary); }

/* ── Responsive ──────────────────────────────────────────────────────────────── */
@media (max-width: 768px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
}

/* ── PRINT STYLES ────────────────────────────────────────────────────────────── */
@media print {
  .app-header, .main, .overlay, .print-loading-overlay { display: none !important; }
  .print-container { display: block !important; }
  body { background: #fff; }
}

.print-container { display: none; }

.invoice-page {
  page-break-after: always;
  padding: 16px 20px;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 14px;
  color: #000;
  background: #fff;
  max-width: 800px;
  margin: 0 auto;
}
.invoice-page:last-child { page-break-after: auto; }
</style>
</head>
<body>

<!-- ── App Header ─────────────────────────────────────────────────────────────── -->
<header class="app-header">
  <div class="header-brand">
    <span>🖨️</span>
    <h1>طباعة الفواتير</h1>
    <span class="header-badge" id="totalBadge">—</span>
  </div>
  <div class="header-actions">
    <span id="lastUpdated" style="font-size:12px; color:var(--text-muted);"></span>
    <button class="btn btn-ghost btn-sm" onclick="loadOrders(true)">🔄 تحديث</button>
    <button class="btn btn-ghost btn-sm" onclick="openSettings()">⚙️ إعدادات</button>
  </div>
</header>

<!-- ── Main ───────────────────────────────────────────────────────────────────── -->
<main class="main">

  <div id="loadingState" class="state-box" style="display:none;">
    <div class="spinner"></div>
    <p class="state-msg">جاري جلب الأوردرات...</p>
  </div>

  <div id="errorState" class="state-box error" style="display:none;">
    <div class="state-icon">⚠️</div>
    <p id="errorMsg" class="state-msg">فشل الاتصال</p>
    <button class="btn btn-ghost" onclick="loadOrders(true)">إعادة المحاولة</button>
  </div>

  <div id="dashboard" style="display:none;">

    <!-- KPIs -->
    <div class="kpi-grid">
      <div class="kpi-card accent">
        <div class="kpi-value" id="kpiAll">0</div>
        <div class="kpi-label">إجمالي جاهز للطباعة</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-value" id="kpiS1">0</div>
        <div class="kpi-label">فواتير عادية (S1)</div>
      </div>
      <div class="kpi-card amber">
        <div class="kpi-value" id="kpiS2">0</div>
        <div class="kpi-label">استبدال / إرجاع (S2)</div>
      </div>
      <div class="kpi-card green">
        <div class="kpi-value" id="kpiUnprinted">0</div>
        <div class="kpi-label">لم يُطبع بعد</div>
      </div>
    </div>

    <!-- Print Action Bar (يظهر عند التحديد) -->
    <div class="print-bar" id="printBar" style="display:none;">
      <span class="print-bar-info" id="selectedInfo">—</span>
      <div style="flex:1;"></div>
      <button class="btn btn-primary" id="printBtn" onclick="startPrint()">🖨️ طباعة المحدد</button>
      <button class="btn btn-ghost btn-sm" onclick="clearSelection()">إلغاء التحديد</button>
    </div>

    <!-- Filters Toolbar -->
    <div class="toolbar">
      <div class="filter-group">
        <span class="filter-label">#أوردر</span>
        <input type="text" class="order-search" id="filterOrder" placeholder="#40000" oninput="applyFilters()">
      </div>
      <div class="filter-group">
        <span class="filter-label">النوع</span>
        <select id="filterType" onchange="applyFilters()">
          <option value="all">الكل</option>
          <option value="S1">أوردر عادي</option>
          <option value="S2">استبدال/استرجاع</option>
        </select>
      </div>
      <div class="filter-group">
        <span class="filter-label">الطباعة</span>
        <select id="filterPrinted" onchange="applyFilters()">
          <option value="all">الكل</option>
          <option value="unprinted">لم يُطبع</option>
          <option value="printed">مطبوع</option>
        </select>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="clearFilters()">مسح</button>
      <div class="spacer"></div>
      <span class="result-count" id="resultCount"></span>
    </div>

    <!-- Table -->
    <div class="table-card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="center" style="width:40px;">
                <input type="checkbox" id="selectAll" onchange="toggleSelectAll(this.checked)" title="تحديد الكل">
              </th>
              <th>رقم الأوردر</th>
              <th>العميل</th>

              <th>التاريخ</th>
              <th>النوع</th>
              <th>الحالة</th>
              <th class="center">الطباعة</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        <div class="table-empty" id="tableEmpty" style="display:none;">لا توجد أوردرات تطابق الفلاتر</div>
      </div>
      <div class="table-footer" id="tableFooter"></div>
    </div>

  </div>
</main>

<!-- ── Print Container (hidden, for printing) ─────────────────────────────────── -->
<div class="print-container" id="printContainer"></div>

<!-- ── Print Loading Overlay ─────────────────────────────────────────────────── -->
<div class="print-loading-overlay" id="printLoading">
  <div class="spinner"></div>
  <p class="print-loading-msg" id="printLoadingMsg">جاري تحضير الفواتير...</p>
</div>

<!-- ── Settings Modal ─────────────────────────────────────────────────────────── -->
<div class="overlay" id="settingsOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">⚙️ إعدادات الاتصال</span>
      <button class="modal-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Worker URL</label>
      <input class="form-input" id="cfgUrl" type="text" placeholder="https://invoice-printer-worker.ecommoda24.workers.dev">
    </div>
    <div class="form-group">
      <label class="form-label">Worker Secret</label>
      <input class="form-input" id="cfgSecret" type="password" placeholder="••••••••••••">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeSettings()">إلغاء</button>
      <button class="btn btn-primary" onclick="saveSettings()">حفظ وتحميل</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// Config
// ══════════════════════════════════════════════════════════════════════════════
const CFG_KEY = "invoice_printer_config";

function getConfig() {
  try { return JSON.parse(localStorage.getItem(CFG_KEY)) || {}; }
  catch { return {}; }
}
function saveConfig(cfg) { localStorage.setItem(CFG_KEY, JSON.stringify(cfg)); }
function isConfigured() {
  const c = getConfig();
  return c.workerUrl?.startsWith("http") && c.secret?.length > 0;
}

function openSettings() {
  const c = getConfig();
  document.getElementById("cfgUrl").value    = c.workerUrl || "";
  document.getElementById("cfgSecret").value = c.secret    || "";
  document.getElementById("settingsOverlay").classList.add("open");
}
function closeSettings() {
  document.getElementById("settingsOverlay").classList.remove("open");
}
function saveSettings() {
  const url    = document.getElementById("cfgUrl").value.trim().replace(/\/$/, "");
  const secret = document.getElementById("cfgSecret").value.trim();
  if (!url || !secret) { alert("برجاء إدخال الـ URL والـ Secret"); return; }
  saveConfig({ workerUrl: url, secret });
  closeSettings();
  loadOrders(true);
}

// ══════════════════════════════════════════════════════════════════════════════
// State
// ══════════════════════════════════════════════════════════════════════════════
let allOrders    = [];
let filtered     = [];
let selectedIds  = new Set();

// ══════════════════════════════════════════════════════════════════════════════
// API
// ══════════════════════════════════════════════════════════════════════════════
async function apiPost(path, body = {}) {
  const { workerUrl, secret } = getConfig();
  const resp = await fetch(`${workerUrl}${path}`, {
    method:  "POST",
    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${secret}` },
    body:    JSON.stringify(body),
  });
  const data = await resp.json();
  if (!resp.ok) throw new Error(data.error || `HTTP ${resp.status}`);
  return data;
}

// ══════════════════════════════════════════════════════════════════════════════
// Load Orders
// ══════════════════════════════════════════════════════════════════════════════
async function loadOrders(forceRefresh = false) {
  if (!isConfigured()) { openSettings(); return; }
  show("loadingState");

  try {
    const data = await apiPost("/orders", { forceRefresh });
    allOrders = data.orders || [];
    selectedIds.clear();
    updateKPIs();
    applyFilters();

    document.getElementById("totalBadge").textContent =
      allOrders.length.toLocaleString("en-US") + " أوردر";
    document.getElementById("lastUpdated").textContent =
      "آخر تحديث: " + formatDateTime(data.cachedAt || new Date().toISOString()) +
      (data.source === "kv" ? " (كاش)" : "");

    show("dashboard");
  } catch (err) {
    document.getElementById("errorMsg").textContent = err.message;
    show("errorState");
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// KPIs
// ══════════════════════════════════════════════════════════════════════════════
function updateKPIs() {
  const s1  = allOrders.filter(o => o.type === "S1").length;
  const s2  = allOrders.filter(o => o.type === "S2").length;
  const unp = allOrders.filter(o => !o.isPrinted).length;
  document.getElementById("kpiAll").textContent       = allOrders.length.toLocaleString("en-US");
  document.getElementById("kpiS1").textContent        = s1.toLocaleString("en-US");
  document.getElementById("kpiS2").textContent        = s2.toLocaleString("en-US");
  document.getElementById("kpiUnprinted").textContent = unp.toLocaleString("en-US");
}

// ══════════════════════════════════════════════════════════════════════════════
// Filters
// ══════════════════════════════════════════════════════════════════════════════
function applyFilters() {
  const orderQ   = document.getElementById("filterOrder").value.trim().replace("#", "");
  const typeQ    = document.getElementById("filterType").value;
  const printedQ = document.getElementById("filterPrinted").value;

  filtered = allOrders;

  if (orderQ)            filtered = filtered.filter(o => o.name.replace("#", "").includes(orderQ));
  if (typeQ !== "all")   filtered = filtered.filter(o => o.type === typeQ);
  if (printedQ === "unprinted") filtered = filtered.filter(o => !o.isPrinted);
  if (printedQ === "printed")   filtered = filtered.filter(o =>  o.isPrinted);

  document.getElementById("resultCount").textContent =
    filtered.length.toLocaleString("en-US") + " نتيجة";

  renderTable(filtered);
  updatePrintBar();
}

function clearFilters() {
  document.getElementById("filterOrder").value   = "";
  document.getElementById("filterType").value    = "all";
  document.getElementById("filterPrinted").value = "all";
  applyFilters();
}

// ══════════════════════════════════════════════════════════════════════════════
// Table
// ══════════════════════════════════════════════════════════════════════════════
function renderTable(orders) {
  const tbody = document.getElementById("tableBody");
  const empty = document.getElementById("tableEmpty");
  const footer = document.getElementById("tableFooter");

  if (orders.length === 0) {
    tbody.innerHTML = "";
    empty.style.display = "block";
    footer.textContent = "";
    return;
  }
  empty.style.display = "none";

  tbody.innerHTML = orders.map(o => {
    const checked    = selectedIds.has(o.id) ? "checked" : "";
    const rowClass   = selectedIds.has(o.id) ? "selected" : "";
    const typeClass  = o.type === "S2" ? "type-s2" : "type-s1";
    const typeLabel  = o.type === "S2" ? "استبدال/استرجاع" : "أوردر عادي";
    const printBadge = o.isPrinted
      ? `<span class="printed-badge">✓ مطبوع</span>`
      : `<span class="unprinted-badge">لم يُطبع</span>`;

    return `
      <tr class="${rowClass}" onclick="toggleRow('${o.id}', event)">
        <td class="center" onclick="event.stopPropagation()">
          <input type="checkbox" ${checked} onchange="toggleRow('${o.id}', event)">
        </td>
        <td><span class="mono">${o.name}</span></td>
        <td>${escHtml(o.customer)}</td>

        <td style="font-size:12px;">${formatDate(o.createdAt)}</td>
        <td><span class="type-badge ${typeClass}">${typeLabel}</span></td>
        <td style="font-size:12px;">${escHtml(o.status)}</td>
        <td class="center">${printBadge}</td>
      </tr>
    `;
  }).join("");

  footer.textContent = `عرض ${orders.length.toLocaleString("en-US")} من ${allOrders.length.toLocaleString("en-US")} أوردر`;
}

function toggleRow(id, event) {
  if (selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  const order = allOrders.find(o => o.id === id);
  applyFilters();
}

function toggleSelectAll(checked) {
  if (checked) filtered.forEach(o => selectedIds.add(o.id));
  else         selectedIds.clear();
  applyFilters();
}

function clearSelection() {
  selectedIds.clear();
  document.getElementById("selectAll").checked = false;
  applyFilters();
}

function updatePrintBar() {
  const count = selectedIds.size;
  const bar   = document.getElementById("printBar");
  bar.style.display = count > 0 ? "flex" : "none";

  const s1Count = [...selectedIds].filter(id => allOrders.find(o => o.id === id)?.type === "S1").length;
  const s2Count = [...selectedIds].filter(id => allOrders.find(o => o.id === id)?.type === "S2").length;
  let info = `${count} أوردر محدد`;
  if (s1Count && s2Count) info += ` (${s1Count} S1 + ${s2Count} S2)`;
  else if (s1Count)       info += ` (${s1Count} S1)`;
  else if (s2Count)       info += ` (${s2Count} S2)`;
  document.getElementById("selectedInfo").textContent = info;
}

// ══════════════════════════════════════════════════════════════════════════════
// PRINT FLOW
// ══════════════════════════════════════════════════════════════════════════════
async function startPrint() {
  if (selectedIds.size === 0) return;

  const selectedOrders = allOrders.filter(o => selectedIds.has(o.id));

  showPrintLoading("جاري جلب بيانات الفواتير...");

  try {
    // جيب بيانات كل أوردر
    const invoices = [];
    let i = 0;
    for (const order of selectedOrders) {
      i++;
      showPrintLoading(`جاري تحضير الفاتورة ${i} من ${selectedOrders.length}...`);
      const data = await apiPost("/invoice", { orderId: order.id });
      invoices.push(data.invoice);
    }

    showPrintLoading("جاري رسم الفواتير...");

    // رسم الفواتير
    const container = document.getElementById("printContainer");
    container.innerHTML = invoices.map(inv =>
      inv.type === "S2" ? renderS2Invoice(inv) : renderS1Invoice(inv)
    ).join("");

    // تهيئة الباركود
    container.querySelectorAll("svg[data-barcode-value]").forEach(el => {
      try {
        JsBarcode(el, el.getAttribute("data-barcode-value"), {
          format: "CODE128", width: 1.5, height: 50, displayValue: false, margin: 0,
        });
      } catch (_) {}
    });

    // تسجيل الطباعة
    for (const inv of invoices) {
      try {
        await apiPost("/track", {
          orderId:     inv.id,
          orderNumber: inv.name,
          type:        inv.type,
        });
      } catch (_) {}
    }

    hidePrintLoading();

    // طباعة
    window.print();

    // تحديث الـ isPrinted في الـ UI
    for (const inv of invoices) {
      const o = allOrders.find(o => o.id === inv.id);
      if (o) o.isPrinted = true;
    }
    clearSelection();
    updateKPIs();

  } catch (err) {
    hidePrintLoading();
    alert("خطأ: " + err.message);
  }
}

function showPrintLoading(msg) {
  document.getElementById("printLoadingMsg").textContent = msg;
  document.getElementById("printLoading").classList.add("show");
}
function hidePrintLoading() {
  document.getElementById("printLoading").classList.remove("show");
}

// ══════════════════════════════════════════════════════════════════════════════
// INVOICE RENDERING — S1 (Order Invoice)
// ══════════════════════════════════════════════════════════════════════════════
function renderS1Invoice(inv) {
  const numericId  = inv.id.replace("gid://shopify/Order/", "");
  const date       = formatInvoiceDate(inv.createdAt);
  const isPrepaid  = inv.isPrepaid;

  const lineItemsHTML = inv.lineItems.map(li => {
    let priceCell;
    if (isPrepaid) {
      priceCell = `<s>${money(li.discountedPrice)}</s>`;
    } else if (li.originalPrice !== li.discountedPrice) {
      priceCell = `<span style="font-weight:400;font-size:12px;"><s>${money(li.originalPrice)}</s></span><br/>${money(li.discountedPrice)}`;
    } else {
      priceCell = money(li.discountedPrice);
    }
    return `
      <tr>
        <td style="border:1px solid #000;padding:10px 8px;text-align:center;">${li.quantity}</td>
        <td style="border:1px solid #000;padding:10px 8px;text-align:center;overflow-wrap:anywhere;word-break:break-word;">${escHtml(li.title)}</td>
        <td style="border:1px solid #000;padding:10px 8px;text-align:center;">${li.sku || "—"}</td>
        <td style="border:1px solid #000;padding:10px 8px;text-align:center;">${priceCell}</td>
      </tr>`;
  }).join("");

  const shippingCell = isPrepaid
    ? `<s>${money(inv.shippingPrice)}</s>`
    : money(inv.shippingPrice);

  let totalCell;
  if (isPrepaid) {
    totalCell = `<div><s>${money(inv.totalPrice)}</s></div><div>${money(inv.totalOutstanding)}</div>`;
  } else {
    totalCell = money(inv.totalPrice);
  }

  const refundedRow = inv.totalRefunded > 0 ? `
    <tr>
      <td colspan="3" style="border:1px solid #000;padding:10px 8px;text-align:right;">Total Refunded</td>
      <td style="border:1px solid #000;padding:10px 8px;text-align:right;">-${money(inv.totalRefunded)}</td>
    </tr>` : "";

  return `
    <div class="invoice-page">
      ${renderInvoiceHeader("Invoice", date)}
      ${renderBarcode(numericId, inv.name)}
      ${renderAddressSection(inv)}
      ${renderNotesSection(inv)}

      <table style="margin:1em 0 0 0;width:100%;border-collapse:collapse;table-layout:fixed;font-size:14px;font-weight:700;border:1px solid #000;">
        <thead>
          <tr>
            <th style="border:1px solid #000;padding:10px 8px;width:55px;text-align:center;">Qty</th>
            <th style="border:1px solid #000;padding:10px 8px;width:50%;text-align:center;overflow-wrap:anywhere;">Item</th>
            <th style="border:1px solid #000;padding:10px 8px;width:140px;text-align:center;">SKU</th>
            <th style="border:1px solid #000;padding:10px 8px;width:90px;text-align:center;">Price</th>
          </tr>
        </thead>
        <tbody>
          ${lineItemsHTML}
          <tr>
            <td colspan="3" style="border:1px solid #000;padding:10px 8px;text-align:right;">Shipping</td>
            <td style="border:1px solid #000;padding:10px 8px;text-align:center;">${shippingCell}</td>
          </tr>
          <tr>
            <td colspan="3" style="border:1px solid #000;padding:12px 8px;text-align:right;font-size:18px;font-weight:700;">Total</td>
            <td style="border:1px solid #000;padding:12px 8px;text-align:center;font-size:18px;font-weight:700;">${totalCell}</td>
          </tr>
          ${refundedRow}
        </tbody>
      </table>

      ${renderFooter()}
    </div>`;
}

// ══════════════════════════════════════════════════════════════════════════════
// INVOICE RENDERING — S2 (Return / Exchange Invoice)
// ══════════════════════════════════════════════════════════════════════════════
function renderS2Invoice(inv) {
  const numericId = inv.id.replace("gid://shopify/Order/", "");
  const date      = formatInvoiceDate(inv.createdAt);

  // Exchange items table
  const exchangeHTML = inv.exchangeItems.length > 0 ? `
    <table style="margin-top:16px;width:100%;border-collapse:collapse;border:1px solid #000;table-layout:fixed;font-size:14px;font-weight:700;">
      <thead>
        <tr>
          <th style="border:1px solid #000;padding:10px 8px;width:55px;text-align:center;">Qty</th>
          <th style="border:1px solid #000;padding:10px 8px;width:55%;text-align:center;overflow-wrap:anywhere;">Exchange items</th>
          <th style="border:1px solid #000;padding:10px 8px;width:170px;text-align:center;">SKU</th>
          <th style="border:1px solid #000;padding:10px 8px;width:90px;text-align:center;">Price</th>
        </tr>
      </thead>
      <tbody>
        ${inv.exchangeItems.map(li => {
          let priceCell = "";
          if (li.originalPrice !== li.discountedPrice && li.originalPrice !== 0) {
            priceCell = `<span style="font-weight:400;font-size:12px;"><s>${money(li.originalPrice)}</s></span><br/>`;
          }
          priceCell += money(li.discountedPrice);
          return `
            <tr>
              <td style="border:1px solid #000;padding:10px 8px;text-align:center;">${li.quantity}</td>
              <td style="border:1px solid #000;padding:10px 8px;text-align:center;overflow-wrap:anywhere;word-break:break-word;">${escHtml(li.title)}</td>
              <td style="border:1px solid #000;padding:10px 8px;text-align:center;">${li.sku || "—"}</td>
              <td style="border:1px solid #000;padding:10px 8px;text-align:center;">${priceCell}</td>
            </tr>`;
        }).join("")}
      </tbody>
    </table>` : "";

  // Return items table
  const returnHTML = inv.returnItems.length > 0 ? `
    <table style="margin-top:16px;width:100%;border-collapse:collapse;border:1px solid #000;table-layout:fixed;font-size:14px;font-weight:700;">
      <thead>
        <tr>
          <th style="border:1px solid #000;padding:10px 8px;width:55px;text-align:center;">Qty</th>
          <th style="border:1px solid #000;padding:10px 8px;width:50%;text-align:center;overflow-wrap:anywhere;">Return items</th>
          <th style="border:1px solid #000;padding:10px 8px;width:140px;text-align:center;">SKU</th>
          <th style="border:1px solid #000;padding:10px 8px;width:90px;text-align:center;">Price</th>
        </tr>
      </thead>
      <tbody>
        ${inv.returnItems.map(li => {
          let priceCell = "";
          if (li.originalPrice > 0) {
            priceCell = `<span style="font-weight:400;font-size:12px;"><s>${money(li.originalPrice)}</s></span><br/>`;
          }
          priceCell += money(0);
          return `
            <tr>
              <td style="border:1px solid #000;padding:10px 8px;text-align:center;">${li.quantity}</td>
              <td style="border:1px solid #000;padding:10px 8px;text-align:center;overflow-wrap:anywhere;word-break:break-word;">${escHtml(li.title)}</td>
              <td style="border:1px solid #000;padding:10px 8px;text-align:center;">${li.sku || "—"}</td>
              <td style="border:1px solid #000;padding:10px 8px;text-align:center;">${priceCell}</td>
            </tr>`;
        }).join("")}
      </tbody>
    </table>` : `
    <table style="margin-top:16px;width:100%;border-collapse:collapse;border:1px solid #000;table-layout:fixed;font-size:14px;font-weight:700;">
      <thead>
        <tr>
          <th style="border:1px solid #000;padding:10px 8px;width:55px;text-align:center;">Qty</th>
          <th style="border:1px solid #000;padding:10px 8px;width:50%;text-align:center;">Return items</th>
          <th style="border:1px solid #000;padding:10px 8px;width:140px;text-align:center;">SKU</th>
          <th style="border:1px solid #000;padding:10px 8px;width:90px;text-align:center;">Price</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td colspan="4" style="border:1px solid #000;padding:10px 8px;text-align:center;">No return items found for this order.</td>
        </tr>
      </tbody>
    </table>`;

  const returnShipping = inv.returnShippingFees != null
    ? money(inv.returnShippingFees)
    : "—";

  return `
    <div class="invoice-page">
      ${renderInvoiceHeader("Return / Exchange Invoice", date)}
      ${renderBarcode(numericId, inv.name)}
      ${renderAddressSection(inv)}
      ${renderNotesSection(inv)}
      ${exchangeHTML}
      ${returnHTML}

      <table style="margin:1em 0 0 0;width:100%;border-collapse:collapse;table-layout:fixed;font-size:14px;font-weight:700;border:1px solid #000;">
        <tbody>
          <tr>
            <td style="border:1px solid #000;padding:10px 8px;text-align:right;">Return shipping</td>
            <td style="border:1px solid #000;padding:10px 8px;text-align:right;width:140px;">${returnShipping}</td>
          </tr>
          <tr>
            <td style="border:1px solid #000;padding:12px 8px;text-align:right;font-size:18px;font-weight:700;">Total</td>
            <td style="border:1px solid #000;padding:12px 8px;text-align:right;width:140px;font-size:18px;font-weight:700;">${money(inv.totalDue)}</td>
          </tr>
        </tbody>
      </table>

      ${renderFooter()}
    </div>`;
}

// ══════════════════════════════════════════════════════════════════════════════
// Shared Invoice Components
// ══════════════════════════════════════════════════════════════════════════════
function renderInvoiceHeader(title, date) {
  return `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0;">
      <h1 style="font-size:22px;font-weight:700;font-family:Arial,sans-serif;margin:0;">${title}</h1>
      <p style="text-align:right;margin:0;font-size:20px;font-weight:700;">${date}</p>
    </div>`;
}

function renderBarcode(numericId, orderName) {
  return `
    <div style="text-align:center;margin-top:0;">
      <div style="display:inline-block;transform:scaleX(1.25);transform-origin:center;">
        <svg data-barcode-value="${numericId}"></svg>
      </div>
      <div style="font-size:16px;margin-top:5px;font-weight:700;">Order ${escHtml(orderName)}</div>
    </div>`;
}

function renderAddressSection(inv) {
  const a = inv.shippingAddress;
  if (!a) return "";

  const rows = [
    ["Name",         a.name         || "—"],
    a.company ? ["Company", a.company] : null,
    ["Address 1",    a.address1     || "—"],
    a.address2 ? ["Address 2", a.address2] : null,
    ["City",         a.city         || "—"],
    ["Province",     a.province     || "—"],
    ["Phone",        a.phone        || "—"],
    ["Order Phone",  inv.phone      || "—"],
    ["Email",        inv.email      || "—"],
  ].filter(Boolean);

  const addrRows = rows.map(([label, val]) => `
    <tr>
      <td style="width:140px;padding:6px 8px;border:1px solid #000;"><strong>${label}</strong></td>
      <td style="padding:6px 8px;border:1px solid #000;font-weight:700;">${escHtml(val)}</td>
    </tr>`).join("");

  return `
    <div style="margin-top:0.5em;display:flex;gap:24px;justify-content:space-between;align-items:stretch;">
      <div style="flex:1 1 60%;text-align:left;">
        <table style="width:100%;border-collapse:collapse;margin-top:8px;font-size:13px;">
          <tbody>${addrRows}</tbody>
        </table>
      </div>
      <div style="flex:1 1 35%;text-align:left;">
        <table style="width:100%;border-collapse:collapse;font-size:13px;margin-top:22px;">
          <tbody>
            <tr>
              <td style="width:95px;padding:18px 8px;border:1px solid #000;white-space:nowrap;"><strong>1st Call</strong></td>
              <td style="padding:18px 10px;border:1px solid #000;"></td>
            </tr>
            <tr>
              <td style="width:95px;padding:18px 8px;border:1px solid #000;white-space:nowrap;"><strong>2nd Call</strong></td>
              <td style="padding:18px 10px;border:1px solid #000;"></td>
            </tr>
            <tr>
              <td style="width:95px;padding:18px 8px;border:1px solid #000;white-space:nowrap;"><strong>3rd Call</strong></td>
              <td style="padding:18px 10px;border:1px solid #000;"></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>`;
}

function renderNotesSection(inv) {
  const hasNote  = inv.note && inv.note.trim();
  const hasAttrs = inv.customAttributes && inv.customAttributes.length > 0;

  const noteContent = hasNote
    ? `<p style="margin:6px 0 0 0;font-size:14px;font-weight:700;line-height:1.2;">${escHtml(inv.note)}</p>`
    : "";

  const attrsContent = hasAttrs
    ? `<div style="margin-top:8px;font-size:13px;">
        ${inv.customAttributes.map(a => `<div>${escHtml(a.key)}: ${escHtml(a.value)}</div>`).join("")}
       </div>`
    : "";

  const content = hasNote || hasAttrs
    ? noteContent + attrsContent
    : `<p style="margin:6px 0 0 0;">—</p>`;

  return `
    <div style="margin-top:1em;border:1px solid #000;padding:10px 12px;">
      <strong>Order Notes</strong><br/>${content}
    </div>`;
}

// ══════════════════════════════════════════════════════════════════════════════
// Helpers
// ══════════════════════════════════════════════════════════════════════════════
function show(id) {
  ["loadingState", "errorState", "dashboard"].forEach(s => {
    const el = document.getElementById(s);
    el.style.display = s === id
      ? (id === "dashboard" ? "block" : "flex")
      : "none";
  });
}

function money(amount) {
  const n = parseFloat(amount) || 0;
  if (n % 1 === 0) return n.toLocaleString("en-US");
  return n.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function escHtml(str) {
  if (!str) return "";
  return String(str)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function formatDate(iso) {
  const d = new Date(iso);
  const pad = n => String(n).padStart(2, "0");
  return `${pad(d.getDate())}-${pad(d.getMonth()+1)}-${d.getFullYear()}`;
}

function formatDateTime(iso) {
  const d = new Date(iso);
  const pad = n => String(n).padStart(2, "0");
  let h = d.getHours();
  const m    = pad(d.getMinutes());
  const ampm = h >= 12 ? "مساءً" : "صباحاً";
  h = h % 12 || 12;
  return `${pad(d.getDate())}-${pad(d.getMonth()+1)}-${d.getFullYear()} ${pad(h)}:${m} ${ampm}`;
}

function formatInvoiceDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" });
}
